<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0e0e0e;color:#f0ece4;font-size:14px;min-height:600px}
:root{--bg:#0e0e0e;--bg2:#141414;--bg3:#1a1a1a;--surface:#1c1c1c;--surface2:#242424;--line:#2a2a2a;--line2:#333;--text:#f0ece4;--muted:#6b6560;--soft:#9a948c;--accent:#c9a96e;--accent2:#e8d5b0;--danger:#d4504a;--r:12px;--r2:18px}
.topbar{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:var(--bg);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50}
.brand{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;display:flex;gap:5px;align-items:baseline}
.brand em{color:var(--accent);font-style:italic;font-weight:400}
.topbar-r{display:flex;align-items:center;gap:10px}
.dot{width:7px;height:7px;border-radius:50%;background:#5a8a6a;box-shadow:0 0 7px #5a8a6a;animation:blink 2.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
.layout{display:grid;grid-template-columns:168px 1fr;min-height:calc(100vh - 56px)}
.sidebar{background:var(--bg2);border-right:1px solid var(--line);padding:10px 7px;display:flex;flex-direction:column;gap:2px}
.nav{display:flex;align-items:center;gap:9px;padding:9px 11px;border:none;border-radius:7px;background:transparent;color:var(--muted);cursor:pointer;font:13px 'DM Sans',sans-serif;text-align:left;width:100%;transition:all .15s}
.nav:hover{background:var(--surface);color:var(--soft)}
.nav.active{background:var(--surface2);color:var(--text);font-weight:500}
.nav.active svg{stroke:var(--accent)}
.content{padding:20px;overflow-y:auto}
.view{display:none;animation:vin .2s ease}
.view.active{display:block}
@keyframes vin{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.vh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.vh h2{font-family:'Playfair Display',serif;font-size:24px;font-weight:600}
.vdate{color:var(--muted);font-size:12px;margin-top:3px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px}
.kpi-a{border-color:rgba(201,169,110,.2);background:linear-gradient(135deg,#1c1c1c,#1e1c17)}
.kl{display:block;color:var(--muted);font-size:10px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px}
.kv{font-family:'Playfair Display',serif;font-size:26px;font-weight:600;line-height:1}
.kt{font-size:15px!important;color:var(--accent)}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);padding:18px}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.ph h3{font-family:'Playfair Display',serif;font-size:15px;font-weight:600}
.list{display:flex;flex-direction:column;gap:8px}
.empty{text-align:center;color:var(--muted);font-size:12px;padding:20px 0}
.item{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:11px 13px;background:var(--bg3);border:1px solid var(--line);border-radius:var(--r);transition:border-color .15s}
.item:hover{border-color:var(--line2)}
.ititle{display:block;font-size:13px;font-weight:500}
.isub{color:var(--muted);font-size:11px;margin-top:2px}
.iact{display:flex;gap:5px;flex-shrink:0}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;margin-left:5px}
.bb{background:rgba(74,122,170,.15);color:#7baad4;border:1px solid rgba(74,122,170,.2)}
.bc{background:rgba(90,138,106,.15);color:#7aba94;border:1px solid rgba(90,138,106,.2)}
.bco{background:rgba(201,169,110,.1);color:var(--accent);border:1px solid rgba(201,169,110,.2)}
.bx{background:rgba(212,80,74,.1);color:#d4847f;border:1px solid rgba(212,80,74,.2)}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.scard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 14px;transition:border-color .15s}
.scard:hover{border-color:rgba(201,169,110,.3)}
.sico{font-size:20px;margin-bottom:7px}
.sname{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;margin-bottom:3px}
.smeta{color:var(--muted);font-size:11px}
.sdur{display:inline-flex;align-items:center;gap:4px;margin-top:8px;background:var(--bg3);border:1px solid var(--line);border-radius:20px;padding:3px 8px;font-size:10px;color:var(--soft)}
.bp{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;background:var(--accent);color:#0e0e0e;border:none;border-radius:7px;font:500 12px 'DM Sans',sans-serif;cursor:pointer;transition:all .15s}
.bp:hover{background:var(--accent2)}
.bg__{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;background:transparent;color:var(--soft);border:1px solid var(--line);border-radius:7px;font:12px 'DM Sans',sans-serif;cursor:pointer;transition:all .15s}
.bg__:hover{background:var(--surface);color:var(--text)}
.bst{padding:4px 8px;background:transparent;border:1px solid var(--line);border-radius:5px;color:var(--soft);font:11px 'DM Sans',sans-serif;cursor:pointer;transition:all .12s}
.bst:hover{background:var(--surface2)}
.bcon:hover{border-color:#4a7aaa;color:#7baad4}
.bcom:hover{border-color:var(--accent);color:var(--accent)}
.bcan:hover{border-color:var(--danger);color:#d4847f}
.idate{background:var(--surface);border:1px solid var(--line);border-radius:7px;padding:6px 10px;color:var(--text);font:12px 'DM Sans',sans-serif}
.idate:focus{outline:none;border-color:var(--accent)}
.hrow{display:flex;gap:8px;align-items:center}
dialog{background:var(--bg2);border:1px solid var(--line2);border-radius:18px;padding:0;max-width:460px;width:calc(100vw - 32px);box-shadow:0 8px 40px rgba(0,0,0,.8);color:var(--text)}
dialog::backdrop{background:rgba(0,0,0,.8)}
.mi{padding:22px}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.mh h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:600}
.mcl{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:4px;transition:color .15s}
.mcl:hover{color:var(--text)}
.form{display:flex;flex-direction:column;gap:13px}
.form label{display:flex;flex-direction:column;gap:4px;color:var(--muted);font-size:10px;letter-spacing:.04em;text-transform:uppercase}
.form input,.form select,.form textarea{background:var(--bg3);border:1px solid var(--line);border-radius:7px;padding:9px 11px;color:var(--text);font:13px 'DM Sans',sans-serif;transition:border-color .15s}
.form input:focus,.form select:focus,.form textarea:focus{outline:none;border-color:var(--accent)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fact{display:flex;justify-content:flex-end;gap:8px;margin-top:4px}
.spanel{max-width:480px}
.stitle{font-family:'Playfair Display',serif;font-size:13px;font-weight:600;border-bottom:1px solid var(--line);padding-bottom:7px;margin-bottom:2px;color:var(--soft)}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(14px);background:#1c1c1c;border:1px solid #333;color:#f0ece4;font-size:12px;padding:8px 16px;border-radius:100px;opacity:0;transition:all .25s;z-index:9999;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<header class="topbar">
  <div class="brand">El Chico <em>de Tirso</em></div>
  <div class="topbar-r">
    <button class="bg__" onclick="fetchData();showToast('Actualizado')">↻ Actualizar</button>
    <div class="dot"></div>
  </div>
</header>
<div class="layout">
  <nav class="sidebar">
    <button class="nav active" data-view="dashboard" onclick="sw(this)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</button>
    <button class="nav" data-view="appointments" onclick="sw(this)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Citas</button>
    <button class="nav" data-view="clients" onclick="sw(this)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M19 8v6M22 11h-6"/></svg>Clientes</button>
    <button class="nav" data-view="services" onclick="sw(this)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2c0 0-4 4-4 8a4 4 0 0 0 8 0c0-4-4-8-4-8z"/><circle cx="12" cy="10" r="1.5"/></svg>Servicios</button>
    <button class="nav" data-view="settings" onclick="sw(this)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Ajustes</button>
  </nav>
  <main class="content">
    <section id="dashboard" class="view active">
      <div class="vh"><div><h2>Buenos días</h2><p class="vdate" id="todayLabel"></p></div><button class="bp" onclick="document.getElementById('ma').showModal()">+ Nueva cita</button></div>
      <div class="kpis">
        <article class="kpi"><span class="kl">Citas hoy</span><strong class="kv" id="k1">0</strong></article>
        <article class="kpi"><span class="kl">Pendientes</span><strong class="kv" id="k2">0</strong></article>
        <article class="kpi kpi-a"><span class="kl">Próxima</span><strong class="kv kt" id="k3">—</strong></article>
        <article class="kpi"><span class="kl">No show</span><strong class="kv" id="k4">0</strong></article>
      </div>
      <div class="panel"><div class="ph"><h3>Agenda de hoy</h3></div><div class="list" id="todayList"></div></div>
    </section>
    <section id="appointments" class="view">
      <div class="vh"><h2>Citas</h2><div class="hrow"><input type="date" id="dateFilter" class="idate" onchange="renderAppts()"/><button class="bp" onclick="document.getElementById('ma').showModal()">+ Nueva</button></div></div>
      <div class="panel"><div class="list" id="apptList"></div></div>
    </section>
    <section id="clients" class="view">
      <div class="vh"><h2>Clientes</h2><button class="bp" onclick="document.getElementById('mc').showModal()">+ Nuevo</button></div>
      <div class="panel"><div class="list" id="clientList"></div></div>
    </section>
    <section id="services" class="view">
      <div class="vh"><h2>Servicios</h2></div>
      <div class="sgrid" id="svcGrid"></div>
    </section>
    <section id="settings" class="view">
      <div class="vh"><h2>Ajustes</h2></div>
      <div class="panel spanel">
        <form class="form" onsubmit="event.preventDefault();showToast('Ajustes guardados')">
          <p class="stitle">Horario</p>
          <div class="frow"><label>Apertura<input type="time" value="10:00"/></label><label>Cierre<input type="time" value="19:00"/></label></div>
          <p class="stitle">Recordatorios</p>
          <div class="frow"><label>24h antes<select><option>Activo</option><option>Inactivo</option></select></label><label>2h antes<select><option>Activo</option><option>Inactivo</option></select></label></div>
          <p class="stitle">Supabase</p>
          <label>URL<input type="text" placeholder="https://xxxx.supabase.co"/></label>
          <label>Anon key<textarea rows="2" placeholder="Pega tu anon key…"></textarea></label>
          <div class="fact"><button type="submit" class="bp">Guardar</button></div>
        </form>
      </div>
    </section>
  </main>
</div>

<dialog id="ma">
  <div class="mi">
    <div class="mh"><h3>Nueva cita</h3><button class="mcl" onclick="document.getElementById('ma').close()">✕</button></div>
    <form class="form" id="af" onsubmit="saveAppt(event)">
      <div class="frow"><label>Nombre<input id="aN" required placeholder="Ana García"/></label><label>Teléfono<input id="aP" required placeholder="+34 600 000 000"/></label></div>
      <div class="frow"><label>Servicio<select id="aS"></select></label><label>Largo<select id="aL"><option value="short">Corto</option><option value="medium">Medio</option><option value="long">Largo</option></select></label></div>
      <div class="frow"><label>Fecha<input type="date" id="aD" required/></label><label>Hora<input type="time" id="aT" required/></label></div>
      <label>Notas<textarea id="aNt" rows="2" placeholder="Observaciones…"></textarea></label>
      <div class="fact"><button type="button" class="bg__" onclick="document.getElementById('ma').close()">Cancelar</button><button type="submit" class="bp">Guardar cita</button></div>
    </form>
  </div>
</dialog>

<dialog id="mc">
  <div class="mi">
    <div class="mh"><h3>Nuevo cliente</h3><button class="mcl" onclick="document.getElementById('mc').close()">✕</button></div>
    <form class="form" id="cf" onsubmit="saveClient(event)">
      <label>Nombre<input id="cN" required placeholder="Ana García"/></label>
      <label>Teléfono<input id="cP" required placeholder="+34 600 000 000"/></label>
      <label>Notas<textarea id="cNt" rows="2" placeholder="Preferencias…"></textarea></label>
      <div class="fact"><button type="button" class="bg__" onclick="document.getElementById('mc').close()">Cancelar</button><button type="submit" class="bp">Guardar</button></div>
    </form>
  </div>
</dialog>

<script>
const D={services:[],appointments:[],clients:[]};
const SVCS=[
  {id:'s1',name:'peinar',category:'Peinado',base_duration_short:25,icon:'✂️'},
  {id:'s2',name:'cortar_y_peinar',category:'Corte',base_duration_short:40,icon:'💈'},
  {id:'s3',name:'tinte',category:'Color',base_duration_short:40,icon:'🎨'},
  {id:'s4',name:'barros',category:'Color',base_duration_short:40,icon:'🌿'},
  {id:'s5',name:'mechas',category:'Color',base_duration_short:60,icon:'✨'},
  {id:'s6',name:'rayos_de_sol',category:'Color',base_duration_short:60,icon:'☀️'}
];
function sw(btn){document.querySelectorAll('.nav').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));btn.classList.add('active');document.getElementById(btn.dataset.view).classList.add('active')}
function pretty(n){return n.replaceAll('_',' ').replace(/\b\w/g,c=>c.toUpperCase())}
function hair(v){return({short:'Corto',medium:'Medio',long:'Largo'}[v]||v||'—')}
function fdt(v){const d=new Date(v);if(isNaN(d))return v||'—';return new Intl.DateTimeFormat('es-ES',{dateStyle:'short',timeStyle:'short'}).format(d)}
function ft(v){const d=new Date(v);if(isNaN(d))return'—';return new Intl.DateTimeFormat('es-ES',{timeStyle:'short'}).format(d)}
function sl(v){return({booked:'Reservada',confirmed:'Confirmada',completed:'Completada',cancelled:'Cancelada',no_show:'No show'}[v]||v)}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2400)}
function bc(s){const m={booked:'bb',confirmed:'bc',completed:'bco',cancelled:'bx',no_show:'bx'};return m[s]||'bb'}
function renderSvcs(){
  const g=document.getElementById('svcGrid');g.innerHTML='';
  const sel=document.getElementById('aS');sel.innerHTML='';
  SVCS.forEach(s=>{
    const c=document.createElement('article');c.className='scard';
    c.innerHTML=`<div class="sico">${s.icon}</div><div class="sname">${pretty(s.name)}</div><div class="smeta">${s.category}</div><div class="sdur">${s.base_duration_short}·${s.base_duration_short+15}·${s.base_duration_short+30} min</div>`;
    g.appendChild(c);
    const o=document.createElement('option');o.value=s.id;o.textContent=pretty(s.name);sel.appendChild(o);
  });
}
function renderClients(){
  const t=document.getElementById('clientList');t.innerHTML='';
  if(!D.clients.length){t.innerHTML='<p class="empty">Sin clientes</p>';return}
  D.clients.forEach(c=>{
    const d=document.createElement('div');d.className='item';
    d.innerHTML=`<div><strong class="ititle">${c.full_name}</strong><p class="isub">${c.phone}${c.notes?' · '+c.notes:''}</p></div>`;
    t.appendChild(d);
  });
}
function mkNode(a){
  const d=document.createElement('div');d.className='item';
  const badge=`<span class="badge ${bc(a.status)}">${sl(a.status)}</span>`;
  d.innerHTML=`<div><strong class="ititle">${a.client_name||'Cliente'} <span style="color:var(--accent)">·</span> ${pretty(a.service_name||'Servicio')}</strong><p class="isub">${fdt(a.starts_at)} · ${hair(a.hair_length)} ${badge}</p></div><div class="iact" id="i${a.id}"></div>`;
  const act=d.querySelector(`#i${a.id}`);
  if(!['completed','cancelled'].includes(a.status)){
    [['confirmed','bcon','Confirmar'],['completed','bcom','Completar'],['cancelled','bcan','Cancelar']].forEach(([st,cls,lbl])=>{
      if(a.status===st)return;
      const b=document.createElement('button');b.className=`bst ${cls}`;b.textContent=lbl;
      b.onclick=()=>updStatus(a.id,st);act.appendChild(b);
    });
  }
  return d;
}
function renderAppts(){
  const all=document.getElementById('apptList'),today=document.getElementById('todayList');
  all.innerHTML='';today.innerHTML='';
  const fd=document.getElementById('dateFilter').value;
  const now=new Date().toISOString().slice(0,10);
  const sorted=[...D.appointments].sort((a,b)=>new Date(a.starts_at)-new Date(b.starts_at));
  sorted.forEach(a=>{if((a.starts_at||'').slice(0,10)===now)today.appendChild(mkNode(a))});
  const filtered=fd?sorted.filter(a=>(a.starts_at||'').slice(0,10)===fd):sorted;
  filtered.forEach(a=>all.appendChild(mkNode(a)));
  if(!today.children.length)today.innerHTML='<p class="empty">Sin citas para hoy</p>';
  if(!filtered.length)all.innerHTML='<p class="empty">Sin citas para este día</p>';
  const ta=sorted.filter(a=>(a.starts_at||'').slice(0,10)===now);
  document.getElementById('k1').textContent=ta.length;
  document.getElementById('k2').textContent=sorted.filter(a=>['booked','confirmed'].includes(a.status)).length;
  document.getElementById('k4').textContent=sorted.filter(a=>a.status==='no_show').length;
  const nxt=sorted.find(a=>new Date(a.starts_at)>new Date()&&['booked','confirmed'].includes(a.status));
  document.getElementById('k3').textContent=nxt?ft(nxt.starts_at):'—';
  const days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const months=['enero','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const n=new Date();
  document.getElementById('todayLabel').textContent=`${days[n.getDay()]} ${n.getDate()} de ${months[n.getMonth()]}`;
}
function renderAll(){renderSvcs();renderClients();renderAppts()}
function fetchData(){
  const d=new Date(),mk=(h,m)=>new Date(d.getFullYear(),d.getMonth(),d.getDate(),h,m).toISOString();
  D.clients=[{id:'1',full_name:'Laura Sánchez',phone:'+34 600 111 222',notes:'Mechas rubias cada 6 semanas'},{id:'2',full_name:'Carmen Ortega',phone:'+34 600 333 444',notes:'Barros sin amoniaco'},{id:'3',full_name:'Marta Jiménez',phone:'+34 600 555 666',notes:'Tinte castaño natural'}];
  D.appointments=[{id:'a1',client_name:'Laura Sánchez',service_name:'mechas',hair_length:'long',starts_at:mk(10,30),status:'confirmed'},{id:'a2',client_name:'Carmen Ortega',service_name:'barros',hair_length:'medium',starts_at:mk(12,0),status:'booked'},{id:'a3',client_name:'Marta Jiménez',service_name:'cortar_y_peinar',hair_length:'long',starts_at:mk(15,0),status:'booked'},{id:'a4',client_name:'Ana Torres',service_name:'tinte',hair_length:'medium',starts_at:mk(17,0),status:'booked'}];
  renderAll();
}
function updStatus(id,status){const f=D.appointments.find(a=>a.id===id);if(f){f.status=status;renderAll();showToast(sl(status))}}
function saveAppt(e){
  e.preventDefault();
  const sv=document.getElementById('aS').value,svc=SVCS.find(s=>s.id===sv)||SVCS[0];
  D.appointments.push({id:crypto.randomUUID(),client_name:document.getElementById('aN').value.trim(),service_name:svc.name,hair_length:document.getElementById('aL').value,starts_at:new Date(`${document.getElementById('aD').value}T${document.getElementById('aT').value}`).toISOString(),status:'booked',notes:document.getElementById('aNt').value.trim()});
  document.getElementById('ma').close();e.target.reset();renderAll();showToast('Cita guardada');
}
function saveClient(e){
  e.preventDefault();
  D.clients.push({id:crypto.randomUUID(),full_name:document.getElementById('cN').value.trim(),phone:document.getElementById('cP').value.trim(),notes:document.getElementById('cNt').value.trim()});
  document.getElementById('mc').close();e.target.reset();renderClients();showToast('Cliente guardado');
}
document.getElementById('dateFilter').value=new Date().toISOString().slice(0,10);
fetchData();
</script>
